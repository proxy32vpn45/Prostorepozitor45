
name: VPN Parser

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install aiohttp

      - name: Run parser
        run: |
          python parser.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output.txt

          git commit -m "update configs" || echo "no changes"

          git push
